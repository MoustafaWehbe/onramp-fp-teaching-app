openapi: 3.1.0

info:
  title: Teaching App API
  version: 1.0.0
  description: REST API for the Teaching App - An async learning management platform

servers:
  - url: /api
    description: Default server

tags:
  - name: Auth
    description: Authentication and session management
  - name: Courses
    description: Course management
  - name: Modules
    description: Module management
  - name: Lessons
    description: Lesson management
  - name: Milestones
    description: Milestone management
  - name: Enrollments
    description: Enrollment management
  - name: Submissions
    description: Submission management

# ─── Reusable components ───────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: HttpOnly access token cookie set on login

  schemas:
    RegisterBody:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter and one number
          example: Password1
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Doe
        role:
          type: string
          enum: [instructor, student]
          example: student

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 1
          example: Password1

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        role:
          type: string
          enum: [instructor, student]
          example: student
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        instructorId:
          type: string
          format: uuid
        title:
          type: string
          example: Full Stack Bootcamp
        description:
          type: string
          example: A complete bootcamp covering frontend and backend
        enrollmentCode:
          type: string
          example: ABC123
        isPublished:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCourseBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Full Stack Bootcamp
        description:
          type: string
          example: A complete bootcamp
        isPublished:
          type: boolean
          example: false

    Module:
      type: object
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        title:
          type: string
          example: Frontend Module
        order:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateModuleBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Frontend Module
        order:
          type: integer
          example: 1

    Lesson:
      type: object
      properties:
        id:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid
        title:
          type: string
          example: HTML Basics
        content:
          type: string
          example: "# HTML Basics\n\nLearn the fundamentals of HTML..."
        videoUrl:
          type: string
          example: https://youtube.com/embed/xyz
        starterCodeUrl:
          type: string
          example: https://github.com/org/starter-repo
        order:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateLessonBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: HTML Basics
        content:
          type: string
        videoUrl:
          type: string
        starterCodeUrl:
          type: string
        order:
          type: integer

    Milestone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid
        title:
          type: string
          example: Build and Deploy a Responsive Landing Page
        instructions:
          type: string
          example: Build a responsive landing page using HTML, CSS, and Flexbox
        acceptanceCriteria:
          type: string
          example: Page must be responsive and deployed on Vercel
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMilestoneBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Build and Deploy a Responsive Landing Page
        instructions:
          type: string
        acceptanceCriteria:
          type: string

    Enrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        enrolledAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EnrollBody:
      type: object
      required: [enrollmentCode]
      properties:
        enrollmentCode:
          type: string
          example: ABC123

    SubmissionLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
        url:
          type: string
          example: https://github.com/student/project
        type:
          type: string
          enum: [github, loom, deployment, other]
          example: github
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubmissionLinkBody:
      type: object
      required: [url, type]
      properties:
        url:
          type: string
          example: https://github.com/student/project
        type:
          type: string
          enum: [github, loom, deployment, other]
          example: github

    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        milestoneId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        gradedBy:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, submitted, graded]
          example: submitted
        score:
          type: integer
          minimum: 0
          maximum: 100
          example: 85
        feedback:
          type: string
          example: Great work! Clean code and well structured.
        links:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/SubmissionLink'
        submittedAt:
          type: string
          format: date-time
        gradedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSubmissionBody:
      type: object
      required: [links]
      properties:
        links:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/SubmissionLinkBody'

    GradeSubmissionBody:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
          example: 85
        feedback:
          type: string
          example: Great work!

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials

    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              example: Success

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email address

# ─── Paths ─────────────────────────────────────────────────────────────────────
paths:

  # ─── Auth ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive auth cookies
      operationId: login
      description: >
        On success, sets two HttpOnly cookies: `accessToken` (15 min) and
        `refreshToken` (7 days). Include `credentials: "include"` in fetch calls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: accessToken=...; HttpOnly; Path=/api
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the access token
      operationId: refreshToken
      description: Reads the `refreshToken` cookie and issues new auth cookies.
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Missing or invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear auth cookies
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Courses ─────────────────────────────────────────────────────────────────
  /courses:
    get:
      tags: [Courses]
      summary: Get all courses (instructor sees own, student sees enrolled)
      operationId: getCourses
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Courses]
      summary: Create a new course (instructor only)
      operationId: createCourse
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseBody"
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses/{id}:
    get:
      tags: [Courses]
      summary: Get a course by ID
      operationId: getCourse
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Course details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Courses]
      summary: Update a course (instructor only)
      operationId: updateCourse
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseBody"
      responses:
        "200":
          description: Course updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Courses]
      summary: Delete a course (instructor only)
      operationId: deleteCourse
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Enrollments ─────────────────────────────────────────────────────────────
  /enrollments:
    post:
      tags: [Enrollments]
      summary: Enroll in a course using enrollment code (student only)
      operationId: enroll
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollBody"
      responses:
        "201":
          description: Enrolled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Enrollment"
        "400":
          description: Invalid enrollment code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Modules ─────────────────────────────────────────────────────────────────
  /courses/{courseId}/modules:
    get:
      tags: [Modules]
      summary: Get all modules for a course
      operationId: getModules
      security:
        - cookieAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Module"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Modules]
      summary: Create a module (instructor only)
      operationId: createModule
      security:
        - cookieAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModuleBody"
      responses:
        "201":
          description: Module created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Module"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Lessons ─────────────────────────────────────────────────────────────────
  /modules/{moduleId}/lessons:
    get:
      tags: [Lessons]
      summary: Get all lessons for a module
      operationId: getLessons
      security:
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lesson"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Lessons]
      summary: Create a lesson (instructor only)
      operationId: createLesson
      security:
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonBody"
      responses:
        "201":
          description: Lesson created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Lesson"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Milestones ──────────────────────────────────────────────────────────────
  /modules/{moduleId}/milestones:
    get:
      tags: [Milestones]
      summary: Get all milestones for a module
      operationId: getMilestones
      security:
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Milestone"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Milestones]
      summary: Create a milestone (instructor only)
      operationId: createMilestone
      security:
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneBody"
      responses:
        "201":
          description: Milestone created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Milestone"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Submissions ─────────────────────────────────────────────────────────────
  /milestones/{milestoneId}/submissions:
    get:
      tags: [Submissions]
      summary: Get submissions for a milestone (instructor sees all, student sees own)
      operationId: getSubmissions
      security:
        - cookieAuth: []
      parameters:
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Submission"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Submissions]
      summary: Submit a milestone (student only)
      operationId: createSubmission
      security:
        - cookieAuth: []
      parameters:
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionBody"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{id}/grade:
    post:
      tags: [Submissions]
      summary: Grade a submission (instructor only)
      operationId: gradeSubmission
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeSubmissionBody"
      responses:
        "200":
          description: Submission graded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - instructor only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /my/grades:
    get:
      tags: [Submissions]
      summary: Get current student gradebook
      operationId: getMyGrades
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Student gradebook
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Submission"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"